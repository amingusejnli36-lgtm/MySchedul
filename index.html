<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPlanner Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="locked">

<div id="lockscreen" class="modal-backdrop show">
    <div class="modal auth-modal">
        <div class="ios-icon">🔒</div>
        <h2>Вход в систему</h2>
        <input type="password" id="pass-input" class="input-field" placeholder="Введите пароль">
        <button class="btn-primary w-full" onclick="checkPass()">Разблокировать</button>
        <p id="auth-error" style="color:var(--red); font-size:12px; margin-top:10px; display:none;">Неверный пароль</p>
    </div>
</div>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <span class="logo-icon"></span>
        <span class="logo-text">iPlanner</span>
    </div>
    <ul class="nav-links">
        <li><a href="#" class="nav-link active" data-section="schedule">🗓 <span>Расписание</span></a></li>
        <li><a href="#" class="nav-link" data-section="tasks">✅ <span>Задачи</span></a></li>
        <li><a href="#" class="nav-link" data-section="important">⭐ <span>Заметки</span></a></li>
        <li><a href="#" class="nav-link" data-section="photos">🖼 <span>Медиатека</span></a></li>
    </ul>
    <div class="sidebar-footer">
        <div id="current-date"></div>
        <div id="sync-status">● Синхронизировано</div>
    </div>
</nav>

<div class="topbar">
    <button class="burger-btn" id="burgerBtn">≡</button>
    <span class="topbar-title">Главная</span>
    <div class="calendar-mini" id="mini-cal"></div>
</div>
<div class="overlay" id="overlay"></div>

<main class="main-content">
    <section class="section active ios-fade" id="section-schedule">
        <div class="section-header">
            <h1>Расписание</h1>
            <button class="btn-primary" onclick="openScheduleModal()">+ Урок</button>
        </div>
        <div class="schedule-grid">
            <div class="schedule-day-header"></div>
            <div class="schedule-day-header">Пн</div>
            <div class="schedule-day-header">Вт</div>
            <div class="schedule-day-header">Ср</div>
            <div class="schedule-day-header">Чт</div>
            <div class="schedule-day-header">Пт</div>
        </div>
        <div id="schedule-table"></div>
    </section>

    <section class="section ios-fade" id="section-tasks">
        <div class="section-header">
            <h1>Задачи</h1>
            <div class="tasks-stats" id="tasks-stats">0 / 0</div>
        </div>
        <div class="task-input-row">
            <input type="text" id="task-input" placeholder="Что нужно сделать?" class="input-field">
            <button class="btn-primary" onclick="addTask()">+</button>
        </div>
        <div id="task-list" class="task-list"></div>
    </section>

    <section class="section ios-fade" id="section-important">
        <div class="section-header">
            <h1>Заметки</h1>
            <button class="btn-primary" onclick="addNote()">Новая</button>
        </div>
        <div id="notes-grid" class="notes-grid"></div>
    </section>

    <section class="section ios-fade" id="section-photos">
        <div class="section-header">
            <h1>Медиатека</h1>
            <label class="btn-primary">
                + Фото
                <input type="file" id="photo-input" accept="image/*" multiple style="display:none" onchange="addPhotos(this)">
            </label>
        </div>
        <div id="photo-gallery" class="photo-gallery"></div>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
